name: Publish to Azure

on:
  workflow_dispatch:
  push:
    branches:
    - production

env:
  AZURE_WEBAPP_NAME: dkexperiments
  AZURE_WEBAPP_PACKAGE_PATH: "./publish"
  
jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ./DKExperiments.slnx

      - name: Build
        run: dotnet build ./DKExperiments.slnx --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./DKExperiments.slnx --configuration Release --no-build --output '${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'

      - name: Deploymenb
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
